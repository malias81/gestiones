<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis Finanzas</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mis Finanzas">
    <meta name="mobile-web-app-capable" content="yes">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .view-section { display: none; animation: fadeIn 0.3s ease-in-out; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #sidebar { transition: transform 0.3s ease-in-out; }
        .sidebar-open { transform: translateX(0); }
        .sidebar-closed { transform: translateX(-100%); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex overflow-hidden">

    <div id="sidebar" class="sidebar-closed fixed inset-y-0 left-0 w-64 bg-indigo-700 text-white shadow-xl z-50 flex flex-col">
        <div class="p-6 flex justify-between items-center border-b border-indigo-600">
            <h2 class="text-2xl font-bold">Mis Finanzas</h2>
            <button onclick="toggleSidebar()" class="p-2 bg-indigo-600 rounded-md hover:bg-indigo-500 focus:outline-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="navigateTo('dashboard')" class="w-full flex items-center p-3 rounded-lg hover:bg-indigo-600 text-left transition-colors">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path></svg>
                Proyecciones
            </button>
            <button onclick="navigateTo('movimiento')" class="w-full flex items-center p-3 rounded-lg hover:bg-indigo-600 text-left transition-colors">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                Nuevo Movimiento
            </button>
            <button onclick="navigateTo('cuentas')" class="w-full flex items-center p-3 rounded-lg hover:bg-indigo-600 text-left transition-colors">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                Gestionar Cuentas
            </button>
        </nav>
    </div>

    <div id="sidebar-overlay" onclick="toggleSidebar()" class="hidden fixed inset-0 bg-black bg-opacity-50 z-40 transition-opacity"></div>

    <div class="flex-1 flex flex-col h-full overflow-hidden relative">
        
        <header class="bg-white shadow-sm z-10 p-4 flex items-center justify-between">
            <button onclick="toggleSidebar()" class="p-2 rounded-md hover:bg-gray-100 focus:outline-none text-indigo-700">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <h1 id="header-title" class="text-xl font-semibold text-slate-800">Proyecciones</h1>
            <div class="w-10"></div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 sm:p-6 pb-20">
            
            <section id="view-dashboard" class="view-section active max-w-4xl mx-auto space-y-6">
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <div class="w-full sm:w-1/2">
                        <label class="block text-sm font-medium text-slate-500 mb-1">Cuenta actual</label>
                        <select id="dash-cuenta-select" onchange="cambiarCuentaActiva(this.value)" class="w-full bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block p-2.5">
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-4">
                    <div class="bg-gradient-to-r from-indigo-600 to-purple-600 rounded-xl p-6 text-white shadow-md relative overflow-hidden">
                        <div class="relative z-10">
                            <p class="text-indigo-100 text-sm font-medium mb-1">Saldo Base Actual</p>
                            <h3 id="dash-saldo-actual" class="text-4xl font-bold tracking-tight">0.00 €</h3>
                        </div>
                        <div class="absolute -right-6 -top-6 w-32 h-32 bg-white opacity-10 rounded-full blur-2xl"></div>
                    </div>
                </div>

                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100">
                    <div class="mb-4">
                        <h3 class="text-lg font-semibold text-slate-800">Proyección a 5 años</h3>
                        <p class="text-sm text-slate-500">Evolución estimada basada en base y movimientos recurrentes.</p>
                    </div>
                    <div class="relative h-72 w-full">
                        <canvas id="projectionChart"></canvas>
                    </div>
                </div>
            </section>

            <section id="view-movimiento" class="view-section max-w-xl mx-auto">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                    <h3 class="text-xl font-bold mb-6 text-slate-800 border-b pb-2">Registrar Transacción</h3>
                    <form id="form-movimiento" onsubmit="guardarMovimiento(event)" class="space-y-5">
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Selecciona la Cuenta</label>
                            <select id="mov-cuenta-select" required class="w-full bg-slate-50 border border-slate-200 text-slate-900 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 p-2.5">
                            </select>
                        </div>

                        <div class="flex gap-4">
                            <label class="flex-1 relative border cursor-pointer rounded-lg p-3 flex items-center space-x-3 hover:bg-slate-50 focus-within:ring-2 focus-within:ring-indigo-500 has-[:checked]:border-indigo-500 has-[:checked]:bg-indigo-50">
                                <input type="radio" name="tipo" value="ingreso" required class="w-4 h-4 text-indigo-600">
                                <span class="block text-sm font-medium text-slate-900">Ingreso</span>
                            </label>
                            <label class="flex-1 relative border cursor-pointer rounded-lg p-3 flex items-center space-x-3 hover:bg-slate-50 focus-within:ring-2 focus-within:ring-red-500 has-[:checked]:border-red-500 has-[:checked]:bg-red-50">
                                <input type="radio" name="tipo" value="gasto" class="w-4 h-4 text-red-600">
                                <span class="block text-sm font-medium text-slate-900">Gasto</span>
                            </label>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="col-span-2">
                                <label class="block text-sm font-medium text-slate-700 mb-1">Motivo / Categoría</label>
                                <input type="text" id="mov-motivo" required placeholder="Ej. Alimentación, Vivienda, Ocio..." class="w-full bg-white border border-slate-300 text-slate-900 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 p-2.5">
                            </div>
                            
                            <div class="col-span-2">
                                <label class="block text-sm font-medium text-slate-700 mb-1">Descripción / Concepto</label>
                                <input type="text" id="mov-concepto" required placeholder="Ej. Mercadona mensual, Alquiler piso..." class="w-full bg-white border border-slate-300 text-slate-900 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 p-2.5">
                            </div>

                            <div class="col-span-2 sm:col-span-1">
                                <label class="block text-sm font-medium text-slate-700 mb-1">Cantidad (€)</label>
                                <input type="number" step="0.01" id="mov-cantidad" required placeholder="0.00" class="w-full bg-white border border-slate-300 text-slate-900 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 p-2.5">
                            </div>
                            <div class="col-span-2 sm:col-span-1">
                                <label class="block text-sm font-medium text-slate-700 mb-1">Mes de inicio</label>
                                <input type="month" id="mov-fecha-inicio" required class="w-full bg-white border border-slate-300 text-slate-900 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 p-2.5">
                            </div>
                        </div>

                        <div class="pt-2 border-t border-slate-100">
                            <label class="flex items-center cursor-pointer">
                                <div class="relative">
                                    <input type="checkbox" id="mov-recurrente" onchange="toggleFechaLimite()" class="sr-only">
                                    <div class="block bg-slate-200 w-10 h-6 rounded-full transition-colors toggle-bg"></div>
                                    <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform toggle-dot"></div>
                                </div>
                                <div class="ml-3 text-sm font-medium text-slate-700">
                                    Es un movimiento recurrente (mensual)
                                </div>
                            </label>
                            <style>
                                input:checked ~ .toggle-bg { background-color: #4f46e5; }
                                input:checked ~ .toggle-dot { transform: translateX(100%); }
                            </style>
                        </div>

                        <div id="container-fecha-limite" class="hidden bg-slate-50 p-4 rounded-lg border border-slate-200 mt-3">
                            <label class="flex items-center space-x-2 mb-2">
                                <input type="checkbox" id="mov-tiene-limite" onchange="toggleInputLimite()" class="rounded text-indigo-600 focus:ring-indigo-500">
                                <span class="text-sm font-medium text-slate-700">Tiene fecha límite</span>
                            </label>
                            <div id="wrapper-input-limite" class="hidden mt-2">
                                <label class="block text-xs text-slate-500 mb-1">Hasta el mes de:</label>
                                <input type="month" id="mov-fecha-fin" class="w-full bg-white border border-slate-300 text-slate-900 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 p-2">
                            </div>
                        </div>

                        <button type="submit" class="w-full text-white bg-indigo-600 hover:bg-indigo-700 focus:ring-4 focus:ring-indigo-300 font-medium rounded-lg text-sm px-5 py-3 text-center transition-colors shadow-md">
                            Guardar Movimiento
                        </button>
                    </form>
                </div>
            </section>

            <section id="view-cuentas" class="view-section max-w-2xl mx-auto">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 mb-6">
                    <h3 class="text-xl font-bold mb-4 text-slate-800">Añadir Nueva Cuenta</h3>
                    <form onsubmit="guardarNuevaCuenta(event)" class="flex flex-col sm:flex-row gap-4">
                        <input type="text" id="nueva-cuenta-nombre" required placeholder="Nombre (ej. Banco, Efectivo)" class="flex-1 bg-slate-50 border border-slate-300 text-slate-900 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 p-2.5">
                        <input type="number" step="0.01" id="nueva-cuenta-base" placeholder="Saldo Inicial (€)" class="w-full sm:w-1/3 bg-slate-50 border border-slate-300 text-slate-900 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 p-2.5">
                        <button type="submit" class="text-white bg-indigo-600 hover:bg-indigo-700 font-medium rounded-lg text-sm px-5 py-2.5 transition-colors whitespace-nowrap">
                            Crear Cuenta
                        </button>
                    </form>
                </div>

                <h3 class="text-lg font-bold mb-3 text-slate-700">Mis Cuentas</h3>
                <div id="lista-cuentas" class="space-y-3">
                </div>
            </section>

        </main>
    </div>

    <div class="fixed bottom-4 right-4 bg-white p-4 rounded-xl shadow-2xl border border-slate-200 z-50 max-w-xs space-y-2 opacity-90 hover:opacity-100 transition-opacity">
        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Migración de Base de Datos</p>
        <div class="flex gap-2">
            <button onclick="exportarBackupFinanzas()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white text-[11px] font-medium py-2 px-2 rounded-lg shadow-sm">
                1. Exportar
            </button>
            <button onclick="document.getElementById('input-importar-db').click()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white text-[11px] font-medium py-2 px-2 rounded-lg shadow-sm">
                2. Importar
            </button>
        </div>
        <input type="file" id="input-importar-db" accept=".json" onchange="importarBackupFinanzas(event)" class="hidden">
    </div>

    <div id="custom-modal" class="hidden fixed inset-0 bg-slate-900 bg-opacity-50 z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl max-w-sm w-full p-6 transform transition-all">
            <h3 id="modal-title" class="text-lg font-bold text-slate-900 mb-2">Mensaje</h3>
            <p id="modal-content" class="text-slate-600 text-sm mb-6">Contenido</p>
            <div id="modal-actions" class="flex justify-end gap-3">
                <button onclick="cerrarModal()" class="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg text-sm font-medium hover:bg-slate-200">Cerrar</button>
            </div>
        </div>
    </div>

    <div id="modal-editar-cuenta" class="hidden fixed inset-0 bg-slate-900 bg-opacity-50 z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl max-w-sm w-full p-6">
            <h3 class="text-lg font-bold text-slate-900 mb-4">Editar Cuenta</h3>
            <input type="hidden" id="edit-cuenta-id">
            
            <label class="block text-sm font-medium text-slate-700 mb-1">Nombre</label>
            <input type="text" id="edit-cuenta-nombre" class="w-full bg-slate-50 border border-slate-300 text-slate-900 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 p-2.5 mb-4">
            
            <label class="block text-sm font-medium text-slate-700 mb-1">Saldo Base Actual (€)</label>
            <input type="number" step="0.01" id="edit-cuenta-base" class="w-full bg-slate-50 border border-slate-300 text-slate-900 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 p-2.5 mb-6">
            
            <div class="flex justify-between items-center">
                <button onclick="eliminarCuenta()" class="text-red-600 hover:bg-red-50 px-3 py-2 rounded-lg text-sm font-medium transition-colors">Eliminar</button>
                <div class="flex gap-2">
                    <button onclick="cerrarModalEditarCuenta()" class="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg text-sm font-medium hover:bg-slate-200">Cancelar</button>
                    <button onclick="guardarEdicionCuenta()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DB_NAME = 'FinanzasAppDB';
        const DB_VERSION = 1;
        let db;
        let cuentaActivaId = null;
        let currentChart = null;

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = (e) => reject('Error en BD');
                request.onsuccess = (e) => { db = e.target.result; resolve(db); };
                request.onupgradeneeded = (e) => {
                    const localDB = e.target.result;
                    if (!localDB.objectStoreNames.contains('cuentas')) {
                        localDB.createObjectStore('cuentas', { keyPath: 'id', autoIncrement: true });
                    }
                    if (!localDB.objectStoreNames.contains('movimientos')) {
                        const storeMovs = localDB.createObjectStore('movimientos', { keyPath: 'id', autoIncrement: true });
                        storeMovs.createIndex('cuentaId', 'cuentaId', { unique: false });
                    }
                };
            });
        }

        function dbAdd(storeName, data) {
            return new Promise((resolve, reject) => {
                const req = db.transaction(storeName, 'readwrite').objectStore(storeName).add(data);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        function dbPut(storeName, data) {
            return new Promise((resolve, reject) => {
                const req = db.transaction(storeName, 'readwrite').objectStore(storeName).put(data);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        function dbGetAll(storeName) {
            return new Promise((resolve, reject) => {
                const req = db.transaction(storeName, 'readonly').objectStore(storeName).getAll();
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const date = new Date();
            const monthStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
            document.getElementById('mov-fecha-inicio').value = monthStr;
            
            await initDB();
            await comprobarCuentasIniciales();
            cargarSelectoresCuentas();
            actualizarDashboard();
        });

        // FUNCIONES DE MIGRACIÓN JSON (INDEXEDDB)
        async function exportarBackupFinanzas() {
            if (!db) { alert('La base de datos no está lista.'); return; }
            const cuentas = await dbGetAll('cuentas');
            const movimientos = await dbGetAll('movimientos');
            const backupData = { version: 1, fechaExportacion: new Date().toISOString(), cuentas: cuentas, movimientos: movimientos };
            const jsonString = JSON.stringify(backupData, null, 2);
            const blob = new Blob([jsonString], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `backup_finanzas_${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        async function importarBackupFinanzas(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const backupData = JSON.parse(e.target.result);
                    if (!backupData.cuentas || !backupData.movimientos) { alert('Formato de archivo no válido.'); return; }
                    if (!confirm('¿Deseas importar los datos? Se añadirán a tu entorno actual.')) return;
                    
                    for (const cuenta of backupData.cuentas) { await dbPut('cuentas', cuenta); }
                    for (const mov of backupData.movimientos) { await dbPut('movimientos', mov); }
                    
                    alert('¡Datos migrados con éxito!');
                    window.location.reload();
                } catch (err) { alert('Error al procesar el archivo JSON.'); }
            };
            reader.readAsText(file);
        }

        function dbGet(storeName, id) {
            return new Promise((resolve, reject) => {
                const req = db.transaction(storeName, 'readonly').objectStore(storeName).get(id);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }
        
        function dbDelete(storeName, id) {
             return new Promise((resolve, reject) => {
                const req = db.transaction(storeName, 'readwrite').objectStore(storeName).delete(id);
                req.onsuccess = () => resolve();
                req.onerror = () => reject(req.error);
            });
        }

        const views = { 'dashboard': 'Proyecciones', 'movimiento': 'Añadir Movimiento', 'cuentas': 'Mis Cuentas' };

        function navigateTo(viewId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');
            document.getElementById('header-title').innerText = views[viewId];
            if(!document.getElementById('sidebar').classList.contains('sidebar-closed')) toggleSidebar();
            if(viewId === 'dashboard') actualizarDashboard();
            if(viewId === 'cuentas') renderListaCuentas();
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('sidebar-closed');
            sidebar.classList.toggle('sidebar-open');
            overlay.classList.toggle('hidden');
            overlay.classList.toggle('block');
        }

        function mostrarMensaje(titulo, mensaje) {
            document.getElementById('modal-title').innerText = titulo;
            document.getElementById('modal-content').innerText = mensaje;
            document.getElementById('custom-modal').classList.remove('hidden');
        }
        function cerrarModal() { document.getElementById('custom-modal').classList.add('hidden'); }

        async function comprobarCuentasIniciales() {
            const cuentas = await dbGetAll('cuentas');
            if (cuentas.length === 0) {
                cuentaActivaId = await dbAdd('cuentas', { nombre: 'Cuenta Principal', base: 0 });
            } else {
                cuentaActivaId = cuentas[0].id;
            }
        }

        async function cargarSelectoresCuentas() {
            const cuentas = await dbGetAll('cuentas');
            const selects = [document.getElementById('dash-cuenta-select'), document.getElementById('mov-cuenta-select')];
            selects.forEach(sel => {
                sel.innerHTML = '';
                cuentas.forEach(c => {
                    const option = document.createElement('option');
                    option.value = c.id; option.textContent = c.nombre;
                    if(c.id === cuentaActivaId) option.selected = true;
                    sel.appendChild(option);
                });
            });
        }

        function cambiarCuentaActiva(id) {
            cuentaActivaId = parseInt(id);
            actualizarDashboard();
            document.getElementById('mov-cuenta-select').value = id;
        }

        function toggleFechaLimite() {
            const isRecurrente = document.getElementById('mov-recurrente').checked;
            const containerLimite = document.getElementById('container-fecha-limite');
            if (isRecurrente) {
                containerLimite.classList.remove('hidden');
            } else {
                containerLimite.classList.add('hidden');
                document.getElementById('mov-tiene-limite').checked = false;
                toggleInputLimite();
            }
        }

        function toggleInputLimite() {
            const tieneLimite = document.getElementById('mov-tiene-limite').checked;
            const wrapperInput = document.getElementById('wrapper-input-limite');
            if (tieneLimite) {
                wrapperInput.classList.remove('hidden');
                document.getElementById('mov-fecha-fin').required = true;
            } else {
                wrapperInput.classList.add('hidden');
                document.getElementById('mov-fecha-fin').required = false;
                document.getElementById('mov-fecha-fin').value = '';
            }
        }

        async function guardarMovimiento(e) {
            e.preventDefault();
            const tipo = document.querySelector('input[name="tipo"]:checked').value;
            const data = {
                cuentaId: parseInt(document.getElementById('mov-cuenta-select').value),
                tipo: tipo,
                motivo: document.getElementById('mov-motivo').value,
                concepto: document.getElementById('mov-concepto').value,
                cantidad: parseFloat(document.getElementById('mov-cantidad').value),
                fechaInicio: document.getElementById('mov-fecha-inicio').value,
                recurrente: document.getElementById('mov-recurrente').checked,
                tieneLimite: document.getElementById('mov-tiene-limite').checked,
                fechaFin: document.getElementById('mov-fecha-fin').value || null
            };

            if (data.recurrente && data.tieneLimite && data.fechaInicio > data.fechaFin) {
                mostrarMensaje('Error', 'La fecha límite no puede ser anterior a la fecha de inicio.');
                return;
            }

            try {
                await dbAdd('movimientos', data);
                mostrarMensaje('¡Éxito!', `El ${tipo} ha sido registrado correctamente.`);
                document.getElementById('form-movimiento').reset();
                document.getElementById('mov-cuenta-select').value = cuentaActivaId;
                const date = new Date();
                document.getElementById('mov-fecha-inicio').value = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
                toggleFechaLimite();
                if(document.getElementById('view-dashboard').classList.contains('active')) actualizarDashboard();
            } catch (err) {
                mostrarMensaje('Error', 'No se pudo guardar el movimiento.');
            }
        }

        async function guardarNuevaCuenta(e) {
            e.preventDefault();
            const nombre = document.getElementById('nueva-cuenta-nombre').value;
            const baseInput = document.getElementById('nueva-cuenta-base').value;
            const base = baseInput ? parseFloat(baseInput) : 0;
            
            await dbAdd('cuentas', { nombre: nombre, base: base });
            document.getElementById('nueva-cuenta-nombre').value = '';
            document.getElementById('nueva-cuenta-base').value = '';
            
            await cargarSelectoresCuentas();
            renderListaCuentas();
            mostrarMensaje('Cuenta Creada', `La cuenta "${nombre}" ha sido creada con ${base}€.`);
        }

        async function renderListaCuentas() {
            const cuentas = await dbGetAll('cuentas');
            const lista = document.getElementById('lista-cuentas');
            lista.innerHTML = '';
            
            cuentas.forEach(c => {
                const div = document.createElement('div');
                div.className = 'flex justify-between items-center p-3 bg-slate-50 border border-slate-200 rounded-lg hover:bg-slate-100 transition-colors cursor-pointer';
                div.onclick = () => abrirModalEditarCuenta(c.id);
                div.innerHTML = `
                    <div>
                        <span class="font-medium text-slate-800">${c.nombre}</span>
                        <div class="text-xs text-slate-500">Base actual: ${parseFloat(c.base).toFixed(2)} €</div>
                    </div>
                    <button class="text-indigo-600 p-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                    </button>
                `;
                lista.appendChild(div);
            });
        }

        async function abrirModalEditarCuenta(id) {
            const cuenta = await dbGet('cuentas', id);
            document.getElementById('edit-cuenta-id').value = cuenta.id;
            document.getElementById('edit-cuenta-nombre').value = cuenta.nombre;
            document.getElementById('edit-cuenta-base').value = cuenta.base;
            document.getElementById('modal-editar-cuenta').classList.remove('hidden');
        }

        function cerrarModalEditarCuenta() {
            document.getElementById('modal-editar-cuenta').classList.add('hidden');
        }

        async function guardarEdicionCuenta() {
            const id = parseInt(document.getElementById('edit-cuenta-id').value);
            const nombre = document.getElementById('edit-cuenta-nombre').value;
            const base = parseFloat(document.getElementById('edit-cuenta-base').value) || 0;

            try {
                await dbPut('cuentas', { id: id, nombre: nombre, base: base });
                cerrarModalEditarCuenta();
                await cargarSelectoresCuentas();
                renderListaCuentas();
                if(id === cuentaActivaId) actualizarDashboard();
            } catch (e) {
                mostrarMensaje('Error', 'No se pudo guardar la modificación.');
            }
        }

        async function eliminarCuenta() {
            const id = parseInt(document.getElementById('edit-cuenta-id').value);
            const cuentas = await dbGetAll('cuentas');
            if (cuentas.length <= 1) {
                mostrarMensaje('Acción denegada', 'No puedes eliminar todas las cuentas. Debe quedar al menos una.');
                return;
            }
            if(confirm("¿Estás seguro de eliminar esta cuenta? Se perderá el acceso a sus movimientos asociados.")) {
                try {
                    await dbDelete('cuentas', id);
                    cerrarModalEditarCuenta();
                    await cargarSelectoresCuentas();
                    if (cuentaActivaId === id) {
                        const nuevasCuentas = await dbGetAll('cuentas');
                        cuentaActivaId = nuevasCuentas[0].id;
                    }
                    renderListaCuentas();
                    actualizarDashboard();
                } catch(e) {
                    mostrarMensaje('Error', 'Hubo un problema al eliminar.');
                }
            }
        }

        async function actualizarDashboard() {
            if (!cuentaActivaId) return;

            const cuenta = await dbGet('cuentas', cuentaActivaId);
            const todosMovs = await dbGetAll('movimientos');
            const movsCuenta = todosMovs.filter(m => m.cuentaId === cuentaActivaId);

            const hoy = new Date();
            const mesesLabels = [];
            const saldosData = [];
            let saldoAcumulado = parseFloat(cuenta.base) || 0;
            
            document.getElementById('dash-saldo-actual').innerText = saldoAcumulado.toFixed(2) + ' €';

            for (let i = 0; i <= 60; i++) {
                let fechaIteracion = new Date(hoy.getFullYear(), hoy.getMonth() + i, 1);
                let mesStr = `${fechaIteracion.getFullYear()}-${String(fechaIteracion.getMonth() + 1).padStart(2, '0')}`;
                mesesLabels.push(mesStr); 

                let variacionMes = 0;
                movsCuenta.forEach(mov => {
                    let aplicarEsteMes = false;
                    if (!mov.recurrente) {
                        if (mov.fechaInicio === mesStr) aplicarEsteMes = true;
                    } else {
                        if (mesStr >= mov.fechaInicio) {
                            if (!mov.tieneLimite) aplicarEsteMes = true;
                            else if (mov.fechaFin && mesStr <= mov.fechaFin) aplicarEsteMes = true;
                        }
                    }

                    if (aplicarEsteMes) {
                        if (mov.tipo === 'ingreso') variacionMes += parseFloat(mov.cantidad);
                        else variacionMes -= parseFloat(mov.cantidad);
                    }
                });

                saldoAcumulado += variacionMes;
                saldosData.push(saldoAcumulado);
            }

            renderChart(mesesLabels, saldosData);
        }

        function renderChart(labels, data) {
            const ctx = document.getElementById('projectionChart').getContext('2d');
            if (currentChart) currentChart.destroy();

            let gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(79, 70, 229, 0.5)'); 
            gradient.addColorStop(1, 'rgba(79, 70, 229, 0.0)');

            currentChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Saldo Proyectado (€)',
                        data: data,
                        borderColor: '#4f46e5',
                        backgroundColor: gradient,
                        borderWidth: 3,
                        pointBackgroundColor: '#ffffff',
                        pointBorderColor: '#4f46e5',
                        pointBorderWidth: 2,
                        pointRadius: 0, 
                        pointHoverRadius: 6,
                        fill: true,
                        tension: 0.4 
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false }, ticks: { maxTicksLimit: 6 } },
                        y: { border: { dash: [4, 4] }, grid: { color: '#f1f5f9' } }
                    },
                    interaction: { mode: 'index', intersect: false },
                }
            });
        }
    </script>
</body>
</html>
